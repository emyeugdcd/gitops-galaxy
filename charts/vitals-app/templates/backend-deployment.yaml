apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitals-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: vitals-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: vitals-backend
  template:
    metadata:
      labels:
        app: vitals-backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.containerPort }}
          name: http
        env:
        - name: PORT
          valueFrom:
            secretKeyRef:
              name: vitals-secret
              key: BACKEND_PORT
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu | quote }}
            memory: {{ .Values.backend.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.backend.resources.limits.cpu | quote }}
            memory: {{ .Values.backend.resources.limits.memory | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
