apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitals-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: vitals-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: vitals-frontend
  template:
    metadata:
      labels:
        app: vitals-frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.containerPort }}
          name: http
        env:
        - name: BACKEND_URL
          valueFrom:
            configMapKeyRef:
              name: vitals-config
              key: BACKEND_URL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: vitals-config
              key: PORT
        resources:
          requests:
            cpu: {{ .Values.frontend.resources.requests.cpu | quote }}
            memory: {{ .Values.frontend.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.frontend.resources.limits.cpu | quote }}
            memory: {{ .Values.frontend.resources.limits.memory | quote }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.frontend.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.frontend.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
