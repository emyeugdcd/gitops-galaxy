apiVersion: v1
kind: Service
metadata:
  name: vitals-backend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: vitals-backend
spec:
  selector:
    app: vitals-backend
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.containerPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: vitals-frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: vitals-frontend
spec:
  selector:
    app: vitals-frontend
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.containerPort }}
